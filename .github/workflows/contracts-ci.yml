name: contracts-ci
on:
  push:
    paths: ["contracts/**"]
  pull_request:
    paths: ["contracts/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo build (contracts compile cleanly)
        run: cargo build --workspace
      - name: cargo test
        run: cargo test --workspace
      - name: soroban-lint (Soroban-specific static analysis)
        run: cargo run -p soroban-lint -- escrow/src/lib.rs atomic-swap/src/lib.rs htlc-core/src/lib.rs
      - name: cargo build --release (wasm)
        run: cargo build --workspace --target wasm32-unknown-unknown --release